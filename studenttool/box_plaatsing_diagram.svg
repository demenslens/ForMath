<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1400" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#444"/>
    </marker>
    <marker id="arrR" markerWidth="9" markerHeight="9" refX="2" refY="3" orient="auto">
      <path d="M7,0 L0,3 L7,6 Z" fill="#444"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1000" height="1400" fill="#f6f4ed"/>

  <!-- ===== TITLE ===== -->
  <text x="40" y="50" font-size="28" font-weight="700" fill="#1c1f26">Pinpoint-box — hoe de afmetingen ontstaan</text>
  <text x="40" y="78" font-size="15" fill="#6b6b6b">Echte gemeten coördinaten (MathLive 0.110). Rood = de box. Blauw = structuur-offset. Grijs = losse cijfer-offsets.</text>
  <line x1="40" y1="95" x2="960" y2="95" stroke="#ae7a15" stroke-width="2"/>

  <!-- ============================================================= -->
  <!-- PANEL 1 : BREUK (the hero, fully measured)                    -->
  <!-- ============================================================= -->
  <text x="40" y="135" font-size="20" font-weight="700" fill="#ae7a15">1 · Breuk  —  bv. 13/12   (volledig gemeten)</text>
  <text x="40" y="160" font-size="14" fill="#444">De cijfers en de </text>
  <text x="158" y="160" font-size="14" fill="#2563aa" font-weight="700">\frac-structuur-offset</text>
  <text x="318" y="160" font-size="14" fill="#444"> dekken NIET hetzelfde gebied. Daar zit de hele truc.</text>

  <!-- coordinate frame: we map measured y 305..345 to canvas y 200..480 (x10 zoom) -->
  <!-- measured: teller cijfers y311 h15 -> 311..326 ; noemer y323 h15 -> 323..338
       struct \frac y312 h22 -> 312..334 ; we draw zoomed -->

  <!-- the rendered fraction (visual) -->
  <g transform="translate(330,0)">
    <!-- teller 13 -->
    <text x="60" y="250" font-size="44" fill="#1c1f26" text-anchor="middle">13</text>
    <!-- breukstreep -->
    <line x1="22" y1="268" x2="98" y2="268" stroke="#1c1f26" stroke-width="2.5"/>
    <!-- noemer 12 -->
    <text x="60" y="312" font-size="44" fill="#1c1f26" text-anchor="middle">12</text>
  </g>

  <!-- grey leaf boxes (digits) -->
  <g stroke="#9aa0a6" stroke-width="1.5" fill="#9aa0a6" fill-opacity="0.10" stroke-dasharray="4 3">
    <rect x="352" y="218" width="76" height="34"/>   <!-- teller 13 leaves -->
    <rect x="352" y="286" width="76" height="34"/>   <!-- noemer 12 leaves -->
  </g>
  <text x="300" y="238" font-size="12" fill="#6b6b6b" text-anchor="end">teller-cijfers</text>
  <text x="300" y="252" font-size="11" fill="#9aa0a6" text-anchor="end">top 311</text>
  <text x="300" y="306" font-size="12" fill="#6b6b6b" text-anchor="end">noemer-cijfers</text>
  <text x="300" y="320" font-size="11" fill="#9aa0a6" text-anchor="end">bottom 338</text>

  <!-- blue structure offset -->
  <rect x="345" y="225" width="90" height="88" fill="none" stroke="#2563aa" stroke-width="2"/>
  <text x="448" y="232" font-size="12" fill="#2563aa">\frac-offset</text>
  <text x="448" y="248" font-size="11" fill="#2563aa">top 312</text>
  <text x="448" y="312" font-size="11" fill="#2563aa">bottom 334</text>
  <text x="448" y="326" font-size="10" fill="#2563aa" font-style="italic">(4px kórter dan cijfers!)</text>

  <!-- red box (the result) -->
  <rect x="349" y="225" width="82" height="95" fill="#c0392b" fill-opacity="0.10" stroke="#c0392b" stroke-width="2.5"/>

  <!-- parameter annotations on the left -->
  <g font-size="13">
    <!-- TOP -->
    <line x1="180" y1="225" x2="345" y2="225" stroke="#444" stroke-width="1" stroke-dasharray="2 2"/>
    <circle cx="345" cy="225" r="3" fill="#c0392b"/>
    <text x="176" y="222" text-anchor="end" font-weight="700" fill="#1c1f26">POSITIE.top = 312</text>
    <text x="176" y="238" text-anchor="end" fill="#444">= max(cijfers 311, struct 312)</text>
    <text x="176" y="252" text-anchor="end" fill="#2563aa">struct snoeit lucht boven teller</text>

    <!-- BOTTOM -->
    <line x1="180" y1="320" x2="349" y2="320" stroke="#444" stroke-width="1" stroke-dasharray="2 2"/>
    <circle cx="349" cy="320" r="3" fill="#c0392b"/>
    <text x="176" y="317" text-anchor="end" font-weight="700" fill="#1c1f26">HOOGTE.bottom = 338</text>
    <text x="176" y="333" text-anchor="end" fill="#444">= max(cijfers 338, struct 334)</text>
    <text x="176" y="347" text-anchor="end" fill="#9aa0a6">cijfers = échte onderkant</text>
  </g>

  <!-- height bracket on the right -->
  <g stroke="#c0392b" stroke-width="1.5">
    <line x1="470" y1="225" x2="470" y2="320" marker-start="url(#arrR)" marker-end="url(#arr)"/>
  </g>
  <text x="480" y="270" font-size="13" font-weight="700" fill="#c0392b">HOOGTE</text>
  <text x="480" y="286" font-size="12" fill="#c0392b">338−312 = 26px</text>

  <!-- width bracket below -->
  <g stroke="#c0392b" stroke-width="1.5">
    <line x1="349" y1="335" x2="431" y2="335" marker-start="url(#arrR)" marker-end="url(#arr)"/>
  </g>
  <text x="390" y="352" font-size="12" font-weight="700" fill="#c0392b" text-anchor="middle">BREEDTE = unie cijfers+struct = 15px</text>

  <!-- takeaway box -->
  <rect x="560" y="180" width="400" height="175" rx="6" fill="#fff" stroke="#ddd"/>
  <text x="580" y="208" font-size="14" font-weight="700" fill="#1c1f26">De regel voor breuken (asymmetrisch):</text>
  <text x="580" y="234" font-size="13" fill="#444">top    = max(unie.top, struct.top)</text>
  <text x="580" y="256" font-size="13" fill="#444">bottom = max(unie.bottom, struct.bottom)</text>
  <text x="580" y="278" font-size="13" fill="#444">breedte = unie</text>
  <text x="580" y="308" font-size="12" fill="#6b6b6b">Boven: structuur wint (snoeit lucht).</text>
  <text x="580" y="326" font-size="12" fill="#6b6b6b">Onder: cijfers winnen (échte rand).</text>
  <text x="580" y="344" font-size="12" fill="#2563aa" font-style="italic">Kleine breuk (2/5) maakt dit zichtbaar.</text>

  <line x1="40" y1="385" x2="960" y2="385" stroke="#e0ddd0" stroke-width="1"/>

  <!-- ============================================================= -->
  <!-- PANEL 2 : LOS GETAL                                            -->
  <!-- ============================================================= -->
  <text x="40" y="425" font-size="20" font-weight="700" fill="#ae7a15">2 · Los getal  —  bv. 24   (gemeten)</text>
  <text x="40" y="450" font-size="14" fill="#444">Geen structuur-offset. De box is gewoon de unie van de losse cijfer-offsets. Recht-toe-recht-aan.</text>

  <g transform="translate(120,470)">
    <text x="60" y="55" font-size="44" fill="#1c1f26" text-anchor="middle">24</text>
    <!-- two grey leaf boxes -->
    <g stroke="#9aa0a6" stroke-width="1.5" fill="#9aa0a6" fill-opacity="0.10" stroke-dasharray="4 3">
      <rect x="30" y="22" width="30" height="40"/>
      <rect x="60" y="22" width="30" height="40"/>
    </g>
    <!-- red box = union -->
    <rect x="28" y="20" width="64" height="44" fill="#c0392b" fill-opacity="0.10" stroke="#c0392b" stroke-width="2.5"/>
    <text x="60" y="92" font-size="12" fill="#c0392b" text-anchor="middle" font-weight="700">box = unie van beide cijfers</text>
  </g>

  <rect x="320" y="470" width="640" height="95" rx="6" fill="#fff" stroke="#ddd"/>
  <text x="340" y="497" font-size="14" font-weight="700" fill="#1c1f26">Parameters:</text>
  <text x="340" y="520" font-size="13" fill="#444">POSITIE.top = bovenkant van de cijfers   ·   HOOGTE = cijferhoogte (~15–21px)</text>
  <text x="340" y="542" font-size="13" fill="#444">BREEDTE = cijfers naast elkaar opgeteld   ·   viaStructuur = false</text>
  <text x="340" y="560" font-size="12" fill="#c0392b" font-style="italic">Valkuil: fragiel als de matcher losse cijfers van verschillende plekken kiest (511_010).</text>

  <line x1="40" y1="595" x2="960" y2="595" stroke="#e0ddd0" stroke-width="1"/>

  <!-- ============================================================= -->
  <!-- PANEL 3 : EXPONENT (not yet measured)                          -->
  <!-- ============================================================= -->
  <text x="40" y="635" font-size="20" font-weight="700" fill="#ae7a15">3 · Exponent  —  bv. 3²   <tspan fill="#d08700">(NOG TE METEN)</tspan></text>
  <text x="40" y="660" font-size="14" fill="#444">Verwacht: de kleine hoge exponent-glyph trekt de box-top omhoog. Nog niet in de browser bevestigd.</text>

  <g transform="translate(120,675)">
    <text x="40" y="55" font-size="44" fill="#1c1f26">3</text>
    <text x="66" y="35" font-size="26" fill="#1c1f26">2</text>
    <!-- grey leaves -->
    <g stroke="#9aa0a6" stroke-width="1.5" fill="#9aa0a6" fill-opacity="0.10" stroke-dasharray="4 3">
      <rect x="38" y="24" width="26" height="40"/>     <!-- base 3 -->
      <rect x="66" y="14" width="20" height="26"/>     <!-- exponent 2 -->
    </g>
    <!-- red box dashed (uncertain) -->
    <rect x="36" y="12" width="52" height="54" fill="#d08700" fill-opacity="0.08" stroke="#d08700" stroke-width="2.5" stroke-dasharray="6 4"/>
    <text x="60" y="92" font-size="12" fill="#d08700" text-anchor="middle" font-weight="700">box zou base + exponent moeten dekken?</text>
  </g>

  <rect x="320" y="675" width="640" height="100" rx="6" fill="#fff" stroke="#ddd"/>
  <text x="340" y="702" font-size="14" font-weight="700" fill="#1c1f26">Open vragen voor de meting:</text>
  <text x="340" y="724" font-size="13" fill="#444">• Telt de exponent-glyph mee, en trekt zijn hoge positie de box-top omhoog?</text>
  <text x="340" y="744" font-size="13" fill="#444">• De structuur-regex bevat ^  — telt een ^-offset al mee? Geeft dat het juiste gedrag?</text>
  <text x="340" y="764" font-size="13" fill="#444">• Geneste macht ((-6)²)² — wat doet de box-hoogte dan?</text>

  <line x1="40" y1="805" x2="960" y2="805" stroke="#e0ddd0" stroke-width="1"/>

  <!-- ============================================================= -->
  <!-- PANEL 4 : WORTEL (derived only)                                -->
  <!-- ============================================================= -->
  <text x="40" y="845" font-size="20" font-weight="700" fill="#ae7a15">4 · Wortel  —  bv. √x   <tspan fill="#d08700">(AFGELEID, alleen headless)</tspan></text>
  <text x="40" y="870" font-size="14" fill="#444">Verwacht net als breuk: top = overstreep, bottom = radicand-cijfers. Nooit in browser gemeten.</text>

  <g transform="translate(120,885)">
    <!-- sqrt symbol -->
    <path d="M10,55 L22,55 L34,80 L52,20 L120,20" fill="none" stroke="#1c1f26" stroke-width="2.5"/>
    <text x="74" y="62" font-size="34" fill="#1c1f26" text-anchor="middle">16</text>
    <!-- overstreep marker -->
    <line x1="52" y1="20" x2="120" y2="20" stroke="#2563aa" stroke-width="3"/>
    <text x="128" y="24" font-size="11" fill="#2563aa">overstreep = top</text>
    <!-- radicand leaves -->
    <g stroke="#9aa0a6" stroke-width="1.5" fill="none" stroke-dasharray="4 3">
      <rect x="56" y="36" width="40" height="34"/>
    </g>
    <text x="128" y="68" font-size="11" fill="#9aa0a6">radicand = bottom</text>
    <!-- red box dashed -->
    <rect x="8" y="18" width="116" height="56" fill="#d08700" fill-opacity="0.08" stroke="#d08700" stroke-width="2.5" stroke-dasharray="6 4"/>
  </g>

  <rect x="320" y="885" width="640" height="100" rx="6" fill="#fff" stroke="#ddd"/>
  <text x="340" y="912" font-size="14" font-weight="700" fill="#c0392b">! Kritiek: wortel-fout kan niet eens geproduceerd worden</text>
  <text x="340" y="936" font-size="13" fill="#444">Opgaven reduceren wortels meteen (∛1→1). Er is geen stap waarin de √ zichtbaar</text>
  <text x="340" y="956" font-size="13" fill="#444">blijft én fout kan zijn. Dus de box is hier nóóit in de browser getest.</text>
  <text x="340" y="976" font-size="12" fill="#6b6b6b" font-style="italic">Eigen, dieper probleem — geparkeerd voor aparte sessie.</text>

  <line x1="40" y1="1015" x2="960" y2="1015" stroke="#e0ddd0" stroke-width="1"/>

  <!-- ============================================================= -->
  <!-- PANEL 5 : de twee correcties bovenop ALLE vormen               -->
  <!-- ============================================================= -->
  <text x="40" y="1055" font-size="20" font-weight="700" fill="#ae7a15">5 · Twee correcties bovenop ELKE box</text>
  <text x="40" y="1080" font-size="14" fill="#444">Nadat de bounds bepaald zijn, gebeurt er nog twee dingen vóór het tekenen. Deze gelden voor alle vormen.</text>

  <!-- HINT_MARGE -->
  <g transform="translate(60,1100)">
    <rect x="0" y="0" width="420" height="120" rx="6" fill="#fff" stroke="#ddd"/>
    <text x="20" y="28" font-size="15" font-weight="700" fill="#1c1f26">HINT_MARGE = -2  (bewust)</text>
    <!-- outer box -->
    <rect x="150" y="45" width="120" height="55" fill="none" stroke="#c0392b" stroke-width="2"/>
    <!-- inner box -->
    <rect x="158" y="51" width="104" height="43" fill="#c0392b" fill-opacity="0.10" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="3 2"/>
    <text x="210" y="76" font-size="11" fill="#c0392b" text-anchor="middle">−2px naar binnen</text>
    <text x="20" y="60" font-size="12" fill="#444">Trekt de box 2px</text>
    <text x="20" y="78" font-size="12" fill="#444">naar binnen aan</text>
    <text x="20" y="96" font-size="12" fill="#444">boven + onder.</text>
    <text x="20" y="114" font-size="11" fill="#6b6b6b" font-style="italic">Geen bug. Niet aankomen.</text>
  </g>

  <!-- delta -->
  <g transform="translate(520,1100)">
    <rect x="0" y="0" width="420" height="120" rx="6" fill="#fff" stroke="#ddd"/>
    <text x="20" y="28" font-size="15" font-weight="700" fill="#c0392b">delta {x,y}  (hoort 0 te zijn)</text>
    <!-- correct box -->
    <rect x="150" y="45" width="80" height="45" fill="none" stroke="#9aa0a6" stroke-width="2" stroke-dasharray="3 2"/>
    <text x="190" y="42" font-size="10" fill="#9aa0a6" text-anchor="middle">hoort hier</text>
    <!-- shifted box -->
    <rect x="170" y="63" width="80" height="45" fill="#c0392b" fill-opacity="0.10" stroke="#c0392b" stroke-width="2"/>
    <line x1="190" y1="67" x2="210" y2="85" stroke="#c0392b" stroke-width="1.2" marker-end="url(#arr)"/>
    <text x="20" y="60" font-size="12" fill="#444">Verschuift de box.</text>
    <text x="20" y="80" font-size="12" fill="#444">delta.y=20 → te laag (511_016)</text>
    <text x="20" y="100" font-size="12" fill="#444">delta.x=−288 → in de marge (511_010)</text>
  </g>

  <text x="40" y="1255" font-size="13" fill="#1c1f26" font-weight="700">Bij elke verkeerde box: check eerst of delta ≈ {0,0}. Zo niet → daar zit het, niet in de vorm-bounds.</text>

  <!-- legend -->
  <g transform="translate(40,1290)">
    <text x="0" y="0" font-size="13" font-weight="700" fill="#1c1f26">Legenda</text>
    <rect x="0" y="12" width="24" height="16" fill="#9aa0a6" fill-opacity="0.10" stroke="#9aa0a6" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="32" y="25" font-size="13" fill="#444">losse cijfer-offset (blad)</text>
    <rect x="240" y="12" width="24" height="16" fill="none" stroke="#2563aa" stroke-width="2"/>
    <text x="272" y="25" font-size="13" fill="#444">structuur-offset (\frac, \sqrt)</text>
    <rect x="520" y="12" width="24" height="16" fill="#c0392b" fill-opacity="0.10" stroke="#c0392b" stroke-width="2.5"/>
    <text x="552" y="25" font-size="13" fill="#444">de getekende box</text>
    <text x="700" y="25" font-size="13" fill="#d08700" font-weight="700">streepjes = nog onzeker</text>
  </g>
  <text x="40" y="1345" font-size="11" fill="#9aa0a6">ForMath studenttool · box-plaatsing referentie · 14-06-2026 · coördinaten in viewport-px</text>
</svg>
